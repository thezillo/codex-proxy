# Fly.io deployment for codex-proxy.
# `app` must be globally unique — change it, or let `fly launch` set it.
app = "codex-proxy"
primary_region = "iad"   # pick one near you / near OpenAI egress

[build]
  dockerfile = "Dockerfile"

[env]
  CODEXPROXY_HOST = "0.0.0.0"
  CODEXPROXY_PORT = "8787"
  # Credentials + refreshed tokens live on the persistent volume.
  CODEXPROXY_CODEX_HOME = "/data"

# Persistent volume so the rotated refresh token survives restarts.
[mounts]
  source = "codex_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  # Scale to zero when idle; wake on request. Long SSE streams keep it alive.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    soft_limit = 40
    hard_limit = 60

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
